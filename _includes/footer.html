<footer class="site-footer h-card">
  <data class="u-url" value="{{ '/' | relative_url }}"></data>

  <div class="wrapper">
    <div style="display: flex; flex-direction: column; gap: 0; text-align: left;">
      
      <h2 class="footer-heading" style="margin: 0; padding: 0; line-height: 1.2;">{{ site.title | escape }}</h2>
      
      <a class="u-email" href="mailto:{{ site.email }}" style="margin: 0; padding: 0; line-height: 1.2;">{{ site.email }}</a>

      <div class="footer-col-wrapper" style="width: 80%; margin: 0; padding: 0;">
        <p style="margin: 0; padding: 0; line-height: 1.2;">
          {{ site.description | escape }}
        </p>
      </div>

    </div>
  </div>

</footer>
